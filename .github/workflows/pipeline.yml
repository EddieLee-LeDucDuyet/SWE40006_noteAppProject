name: NoteFlow CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── STAGE 2: CI / Build ────────────────────────────────────────
  build:
    name: "Stage 2 - CI/Build Server"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t noteflow:latest .

      - name: Verify image exists
        run: docker image inspect noteflow:latest
        
      - name: Save Docker image
        run: docker save noteflow:latest -o /tmp/noteflow.tar

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: noteflow-image
          path: /tmp/noteflow.tar
          retention-days: 1

  # ── STAGE 3: Test ──────────────────────────────────────────────
  test:
    name: "Stage 3 - Test Server"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Run automated tests
        run: npm test
        working-directory: backend

  # ── STAGE 4: Deploy ────────────────────────────────────────────
  deploy:
    name: "Stage 4 - Production Server"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t noteflow:production .

      - name: Stop existing container
        run: docker stop noteflow-prod || true

      - name: Remove old container
        run: docker rm noteflow-prod || true

      - name: Start production container
        run: |
          docker run -d \
            --name noteflow-prod \
            -p 5000:5000 \
            -e NODE_ENV=production \
            noteflow:production

      - name: Wait for container to start
        run: sleep 5

      - name: Health check
        run: curl --fail http://localhost:5000/health

      - name: Confirm deployment
        run: |
          echo "✅ NoteFlow successfully deployed!"
          echo "🐳 Container: noteflow-prod"
          echo "🌐 Running on port 5000"
          docker ps | grep noteflow-prod
