name: NoteFlow CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── STAGE 2: CI / Build ────────────────────────────────────────
  build:
    name: "Stage 2 - CI/Build Server"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t noteflow:latest .

      - name: Verify image exists
        run: docker image inspect noteflow:latest

  # ── STAGE 3: Test ──────────────────────────────────────────────
  test:
    name: "Stage 3 - Test Server"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Run automated tests
        run: npm test
        working-directory: backend

  # ── STAGE 4: Deploy to Railway (Production) ───────────────────
  deploy:
    name: "Stage 4 - Production Server (Railway)"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{secrets.RAILWAY_TOKEN}}
          RAILWAY_PROJECT_ID: ${{secrets.RAILWAY_PROJECT_ID}}

      - name: Wait for deployment
        run: sleep 30

      - name: Health check on live server
        run: |
          curl --fail ${{secrets.RAILWAY_URL}}/health
          echo "✅ Health check passed!"

      - name: Metrics check on live server
        run: |
          curl --fail ${{secrets.RAILWAY_URL}}/metrics
          echo "✅ Metrics endpoint verified!"

      - name: Confirm deployment
        run: |
          echo "✅ NoteFlow successfully deployed to Railway!"
          echo "🌐 Live at ${{secrets.RAILWAY_URL}}"
